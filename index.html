<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Professional contact form with modern glassmorphism design. Get in touch with us easily." />
  <title>Contact Us — Get In Touch</title>

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background canvas -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Main content -->
  <main class="main-wrapper">
    <section class="form-card" aria-label="Contact form">

      <!-- Header -->
      <header class="form-header">
        <div class="form-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h1>Get In Touch</h1>
        <p class="subtitle">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
      </header>

      <!-- Contact Form -->
      <form id="contact-form" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="full-name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="full-name"
              name="fullName"
              placeholder="John Doe"
              autocomplete="name"
              aria-required="true"
              aria-describedby="full-name-error"
            />
          </div>
          <span class="error-message" id="full-name-error" role="alert"></span>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="john@example.com"
              autocomplete="email"
              aria-required="true"
              aria-describedby="email-error"
            />
          </div>
          <span class="error-message" id="email-error" role="alert"></span>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="09XX XXX XXXX"
              autocomplete="tel"
              aria-required="true"
              aria-describedby="phone-error"
            />
          </div>
          <span class="error-message" id="phone-error" role="alert"></span>
        </div>

        <!-- Message -->
        <div class="form-group">
          <label for="message">Message</label>
          <div class="input-wrapper textarea-wrapper">
            <svg class="input-icon textarea-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <textarea
              id="message"
              name="message"
              placeholder="Tell us what's on your mind..."
              rows="5"
              aria-required="true"
              aria-describedby="message-error"
            ></textarea>
          </div>
          <span class="error-message" id="message-error" role="alert"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn" class="submit-btn">
          <span class="btn-text">Send Message</span>
          <span class="btn-loader" aria-hidden="true"></span>
          <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Success Message (hidden by default) -->
      <div id="success-message" class="success-message" role="status" aria-live="polite" hidden>
        <div class="success-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h2>Message Sent!</h2>
        <p>Thank you for reaching out. We'll get back to you shortly.</p>
        <button type="button" id="send-another-btn" class="send-another-btn">Send Another Message</button>
      </div>

    </section>
  </main>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
